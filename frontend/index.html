<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="IoT Smart Cart System — Add items to cart and checkout." />
  <title>IoT SmartCart — Shop</title>
  <link rel="stylesheet" href="index.css" />
</head>
<body>
  <nav class="navbar" id="navbar">
    <a href="index.html" class="navbar-brand">
      <div class="navbar-logo">⚡</div>
      <span class="navbar-title">IOT SMARTCART</span>
    </a>
    <ul class="navbar-links">
      <li><a href="index.html" class="active" id="nav-shop">Shop</a></li>
      <li><a href="dashboard.html" id="nav-dashboard">Dashboard</a></li>
    </ul>
    <button class="cart-toggle" id="cart-toggle" onclick="toggleCart()">
      <svg class="cart-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="9" cy="21" r="1"></circle>
        <circle cx="20" cy="21" r="1"></circle>
        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
      </svg>
      <span class="cart-badge" id="cart-badge" style="display:none;">0</span>
    </button>
  </nav>

  <div class="toast-container" id="toast-container"></div>

  <main class="page-container">
    <header class="page-header">
      <h1>SMART DEVICES</h1>
      <p>Add items to your cart and checkout. The smart cart will navigate to collect them.</p>
    </header>
    <div class="product-grid" id="product-grid">
      <div class="product-card skeleton" style="height:420px"></div>
      <div class="product-card skeleton" style="height:420px"></div>
      <div class="product-card skeleton" style="height:420px"></div>
    </div>
  </main>

  <div class="cart-overlay" id="cart-overlay" onclick="toggleCart()"></div>
  <aside class="cart-drawer" id="cart-drawer">
    <div class="cart-drawer-header">
      <h2>YOUR CART</h2>
      <button class="cart-close" onclick="toggleCart()">✕</button>
    </div>

    <div class="cart-drawer-body" id="cart-drawer-body">
      <div class="cart-empty" id="cart-empty">
        <div class="cart-empty-icon">🛒</div>
        <p>Your cart is empty</p>
        <span>Add some items to get started</span>
      </div>
      <div class="cart-items" id="cart-items" style="display:none;"></div>
    </div>

    <div class="cart-drawer-footer" id="cart-drawer-footer" style="display:none;">
      <div class="cart-summary">
        <div class="cart-summary-row">
          <span>Items</span>
          <span id="cart-total-items">0</span>
        </div>
        <div class="cart-summary-row cart-summary-total">
          <span>Total</span>
          <span id="cart-total-price">$0.00</span>
        </div>
      </div>

      <div class="checkout-section" id="checkout-section">
        <input type="text" class="checkout-name-input" id="checkout-name" placeholder="Your name" />
        <button class="checkout-btn" id="checkout-btn" onclick="checkout()">
          CHECKOUT
        </button>
      </div>
    </div>
  </aside>

  <script src="index.js"></script>
</body>
</html>
